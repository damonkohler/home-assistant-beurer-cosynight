repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013", "--disable", "MD036", "--fix"]
        files: \.md$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c "./venv/bin/python3 -m pytest tests/ -q"
        language: system
        pass_filenames: false
        always_run: true
